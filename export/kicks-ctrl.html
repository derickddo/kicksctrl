document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'DM Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"2d3587e7-3000-4f15-a381-418725c045b0\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *{box-sizing:border-box;}\n    html,body{margin:0;padding:0;scroll-behavior:smooth;}\n    body{font-family:'DM Sans',system-ui,sans-serif;background:#FAFAF8;color:#0A0A0A;-webkit-font-smoothing:antialiased;}\n    button{font-family:inherit;cursor:pointer;}\n    input,textarea,select{font-family:inherit;}\n    a{color:inherit;text-decoration:none;}\n    ::selection{background:#1A7A1A;color:#fff;}\n    ::placeholder{color:#9aa09a;}\n    section[id]{scroll-margin-top:72px;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh;\">\n\n  <header style=\"position:sticky;top:0;z-index:60;background:#0A0A0A;border-bottom:1px solid rgba(255,255,255,0.08);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;height:64px;display:flex;align-items:center;justify-content:space-between;gap:24px;\">\n      <a href=\"#top\" onclick=\"{{ closeMenu }}\" style=\"display:flex;align-items:center;gap:11px;text-decoration:none;cursor:pointer;\">\n        <span style=\"width:12px;height:12px;background:#1A7A1A;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Bebas Neue';font-size:25px;letter-spacing:2px;color:#fff;line-height:1;white-space:nowrap;\">KICKSctrl<\u002Fspan>\n      <\u002Fa>\n      <sc-if value=\"{{ showDesktopNav }}\" hint-placeholder-val=\"{{ true }}\">\n        <nav style=\"display:flex;align-items:center;gap:2px;\">\n          <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n            <a href=\"{{ item.href }}\" onclick=\"{{ item.onClick }}\" style=\"padding:8px 11px;font-size:13px;font-weight:500;letter-spacing:0.4px;color:{{ item.color }};border-bottom:{{ item.bd }};cursor:pointer;\" style-hover=\"color:#fff;\">{{ item.label }}<\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fnav>\n      <\u002Fsc-if>\n      <div style=\"display:flex;align-items:center;gap:14px;\">\n        <sc-if value=\"{{ showDesktopNav }}\" hint-placeholder-val=\"{{ true }}\">\n          <a href=\"#contact\" onclick=\"{{ closeMenu }}\" style=\"background:#1A7A1A;color:#fff;padding:11px 18px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:inline-block;\" style-hover=\"background:#22982A;\">Investor / Partner<\u002Fa>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ showBurger }}\" hint-placeholder-val=\"{{ false }}\">\n          <button onclick=\"{{ toggleMenu }}\" style=\"background:none;border:1px solid rgba(255,255,255,0.18);color:#fff;width:40px;height:40px;font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;\">{{ burgerIcon }}<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ mobileMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#0A0A0A;border-top:1px solid rgba(255,255,255,0.08);padding:8px 28px 22px;display:flex;flex-direction:column;\">\n        <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n          <a href=\"{{ item.href }}\" onclick=\"{{ item.onClick }}\" style=\"border-bottom:1px solid rgba(255,255,255,0.06);text-align:left;padding:15px 0;font-size:15px;font-weight:500;color:{{ item.color }};display:block;cursor:pointer;\">{{ item.label }}<\u002Fa>\n        <\u002Fsc-for>\n        <a href=\"#contact\" onclick=\"{{ closeMenu }}\" style=\"margin-top:18px;background:#1A7A1A;color:#fff;padding:15px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;display:block;text-align:center;cursor:pointer;\">Investor / Partner Inquiry<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fheader>\n\n  <main>\n\n    <!-- ===== HERO ===== -->\n    <section id=\"top\" style=\"position:relative;background:#0A0A0A;color:#fff;min-height:90vh;display:flex;align-items:center;overflow:hidden;\">\n      <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block;\"><\u002Fcanvas>\n      <div style=\"position:absolute;inset:0;background:radial-gradient(circle at 50% 48%, rgba(26,122,26,0.12), transparent 62%);pointer-events:none;\"><\u002Fdiv>\n      <div style=\"position:relative;max-width:1240px;margin:0 auto;padding:0 28px;width:100%;pointer-events:none;\">\n        <div style=\"max-width:780px;\">\n          <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#3DBF44;margin-bottom:24px;\">KICKSCTRL &nbsp;//&nbsp; MATERIAL RECOVERY<\u002Fdiv>\n          <h1 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(50px,8vw,120px);line-height:0.9;letter-spacing:1px;margin:0 0 26px;\">Recovery infrastructure for the world's discarded footwear<\u002Fh1>\n          <p style=\"font-size:clamp(16px,2vw,21px);line-height:1.5;color:#c2c7c2;max-width:560px;margin:0 0 36px;\">We collect, sort, and recycle post-consumer footwear into clean material streams.<\u002Fp>\n          <a href=\"#contact\" style=\"pointer-events:auto;display:inline-block;background:#1A7A1A;color:#fff;padding:17px 30px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:#22982A;\">Investor / Partner Inquiry &nbsp;→<\u002Fa>\n          <div style=\"margin-top:48px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b716b;\">\n            <span>Global sources<\u002Fspan><span style=\"color:#1A7A1A;\">→<\u002Fspan><span>Sorting · Africa<\u002Fspan><span style=\"color:#1A7A1A;\">→<\u002Fspan><span style=\"color:#3DBF44;\">Rubber · Foam · Textile<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== STATS ===== -->\n    <section style=\"background:#0A0A0A;color:#fff;border-top:1px solid rgba(255,255,255,0.08);\">\n      <div style=\"max-width:1240px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));\">\n        <div style=\"padding:54px 30px;border-left:1px solid rgba(255,255,255,0.08);\">\n          <div style=\"font-family:'Bebas Neue';font-size:clamp(50px,6vw,82px);line-height:0.85;\">24B<\u002Fdiv>\n          <div style=\"margin-top:12px;font-size:13px;color:#8a908a;line-height:1.45;max-width:210px;\">Pairs of footwear consumed globally each year<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:54px 30px;border-left:1px solid rgba(255,255,255,0.08);\">\n          <div style=\"font-family:'Bebas Neue';font-size:clamp(50px,6vw,82px);line-height:0.85;color:#3DBF44;\">&lt;5%<\u002Fdiv>\n          <div style=\"margin-top:12px;font-size:13px;color:#8a908a;line-height:1.45;max-width:210px;\">Formally recycled — the rest is landfilled or burned<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:54px 30px;border-left:1px solid rgba(255,255,255,0.08);\">\n          <div style=\"font-family:'Bebas Neue';font-size:clamp(50px,6vw,82px);line-height:0.85;\">92M<\u002Fdiv>\n          <div style=\"margin-top:12px;font-size:13px;color:#8a908a;line-height:1.45;max-width:210px;\">Tonnes of textile waste generated annually<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:54px 30px;border-left:1px solid rgba(255,255,255,0.08);\">\n          <div style=\"font-family:'Bebas Neue';font-size:clamp(50px,6vw,82px);line-height:0.85;\">JUL 2026<\u002Fdiv>\n          <div style=\"margin-top:12px;font-size:13px;color:#8a908a;line-height:1.45;max-width:210px;\">EU ban on destruction of unsold goods takes effect<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== PROBLEM ===== -->\n    <section id=\"problem\" style=\"background:#FAFAF8;padding:clamp(80px,10vw,132px) 0;border-top:1px solid #E4E4E0;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;\">\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#1A7A1A;margin-bottom:18px;\">The Problem<\u002Fdiv>\n        <h2 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(38px,6vw,92px);line-height:0.9;letter-spacing:1px;margin:0 0 22px;max-width:900px;\">The footwear industry has no end-of-life system<\u002Fh2>\n        <p style=\"font-size:clamp(16px,2vw,20px);line-height:1.55;color:#55594f;max-width:620px;margin:0 0 60px;\">Production is industrial. Disposal is not. The gap between the two is a structural failure measured in billions of pairs.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:48px;margin-bottom:72px;\">\n          <div>\n            <div style=\"font-family:'Bebas Neue';font-size:clamp(64px,8vw,108px);line-height:0.82;\">24B<\u002Fdiv>\n            <div style=\"font-size:15px;color:#55594f;margin-top:14px;line-height:1.5;\">pairs consumed annually — and rising with population and fast fashion.<\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"font-family:'Bebas Neue';font-size:clamp(64px,8vw,108px);line-height:0.82;\">92M<\u002Fdiv>\n            <div style=\"font-size:15px;color:#55594f;margin-top:14px;line-height:1.5;\">tonnes of textile waste generated each year, footwear among the hardest fractions.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#1A7A1A;margin-bottom:34px;\">What actually gets recovered<\u002Fdiv>\n        <div style=\"max-width:840px;margin-bottom:80px;\">\n          <div style=\"margin-bottom:38px;\">\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;\">\n              <span style=\"font-size:15px;font-weight:600;\">Formally recycled, globally<\u002Fspan>\n              <span style=\"font-family:'Bebas Neue';font-size:34px;color:#1A7A1A;line-height:1;\">&lt;5%<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:12px;background:#E4E4E0;position:relative;overflow:hidden;\">\n              <div style=\"position:absolute;left:0;top:0;bottom:0;width:5%;background:#1A7A1A;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;\">\n              <span style=\"font-size:15px;font-weight:600;\">Formal recycling infrastructure in Africa<\u002Fspan>\n              <span style=\"font-family:'Bebas Neue';font-size:34px;color:#1A7A1A;line-height:1;\">&lt;1%<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"height:12px;background:#E4E4E0;position:relative;overflow:hidden;\">\n              <div style=\"position:absolute;left:0;top:0;bottom:0;width:1%;background:#1A7A1A;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:56px;align-items:start;\">\n          <div>\n            <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(28px,3.5vw,44px);letter-spacing:1px;margin:0 0 16px;\">Why footwear resists recycling<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#55594f;margin:0;\">A single shoe combines rubber, EVA foam, textiles, plastics, and adhesives — bonded together by design. Standard single-stream recycling can't separate them, so even collected shoes are downcycled or discarded. Footwear needs a dedicated separation process, which until now has not existed at scale.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"border-left:2px solid #1A7A1A;padding-left:28px;\">\n            <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#1A7A1A;margin-bottom:14px;\">Regulatory pressure<\u002Fdiv>\n            <div style=\"font-family:'Bebas Neue';font-size:clamp(36px,4vw,60px);line-height:0.9;margin-bottom:14px;\">July 2026<\u002Fdiv>\n            <p style=\"font-size:16px;line-height:1.65;color:#55594f;margin:0;\">The EU's ban on the destruction of unsold goods takes effect, extending EPR obligations to footwear producers. Brands will need audited recovery routes — not incineration — for end-of-life and unsold stock.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== SOLUTION ===== -->\n    <section id=\"solution\" style=\"background:#0A0A0A;color:#fff;padding:clamp(80px,10vw,132px) 0;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;\">\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#3DBF44;margin-bottom:18px;\">The Solution<\u002Fdiv>\n        <h2 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(38px,6vw,92px);line-height:0.9;letter-spacing:1px;margin:0 0 22px;max-width:900px;\">A full-stack footwear recovery system<\u002Fh2>\n        <p style=\"font-size:clamp(16px,2vw,20px);line-height:1.55;color:#c2c7c2;max-width:620px;margin:0 0 60px;\">One continuous chain from discarded shoe to graded raw material — owned end to end, instrumented throughout.<\u002Fp>\n\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#8a908a;margin-bottom:30px;\">The process<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);margin-bottom:80px;\">\n          <div style=\"background:#0A0A0A;padding:36px 30px;\"><div style=\"font-family:'Bebas Neue';font-size:40px;color:#1A7A1A;line-height:1;\">01<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:26px;letter-spacing:1px;margin:14px 0 10px;\">Aggregate<\u002Fh3><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Consolidate volume from take-back, retail, and municipal channels into intake hubs.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0A0A0A;padding:36px 30px;\"><div style=\"font-family:'Bebas Neue';font-size:40px;color:#1A7A1A;line-height:1;\">02<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:26px;letter-spacing:1px;margin:14px 0 10px;\">Disassemble<\u002Fh3><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Separate bonded components into clean single-material fractions.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0A0A0A;padding:36px 30px;\"><div style=\"font-family:'Bebas Neue';font-size:40px;color:#1A7A1A;line-height:1;\">03<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:26px;letter-spacing:1px;margin:14px 0 10px;\">Process<\u002Fh3><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Clean, shred, and grade each fraction to industrial feedstock specification.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0A0A0A;padding:36px 30px;\"><div style=\"font-family:'Bebas Neue';font-size:40px;color:#1A7A1A;line-height:1;\">04<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:26px;letter-spacing:1px;margin:14px 0 10px;\">Offtake<\u002Fh3><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Sell graded streams into manufacturing under recurring supply agreements.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(28px,4vw,52px);letter-spacing:1px;margin:0 0 32px;\">Three clean output streams<\u002Fh3>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;\">\n          <div style=\"background:#141513;border:1px solid rgba(255,255,255,0.08);padding:38px 32px;\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px;\"><span style=\"width:10px;height:10px;background:#1A7A1A;display:block;\"><\u002Fspan><span style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;\">Stream 01<\u002Fspan><\u002Fdiv>\n            <h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:34px;letter-spacing:1px;margin:0 0 12px;\">Rubber<\u002Fh4>\n            <p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Crumb and granulate for surfacing, molded goods, and new outsole compound.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#141513;border:1px solid rgba(255,255,255,0.08);padding:38px 32px;\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px;\"><span style=\"width:10px;height:10px;background:#1A7A1A;display:block;\"><\u002Fspan><span style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;\">Stream 02<\u002Fspan><\u002Fdiv>\n            <h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:34px;letter-spacing:1px;margin:0 0 12px;\">Foam<\u002Fh4>\n            <p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Reclaimed EVA and PU for cushioning, padding, and rebonded foam products.<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"background:#141513;border:1px solid rgba(255,255,255,0.08);padding:38px 32px;\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px;\"><span style=\"width:10px;height:10px;background:#1A7A1A;display:block;\"><\u002Fspan><span style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;\">Stream 03<\u002Fspan><\u002Fdiv>\n            <h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:34px;letter-spacing:1px;margin:0 0 12px;\">Textile<\u002Fh4>\n            <p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Fiber feedstock for insulation, nonwovens, and reprocessed textile applications.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== IMPACT ===== -->\n    <section id=\"impact\" style=\"background:#FAFAF8;padding:clamp(80px,10vw,132px) 0;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;\">\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#1A7A1A;margin-bottom:18px;\">Impact<\u002Fdiv>\n        <h2 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(38px,6vw,92px);line-height:0.9;letter-spacing:1px;margin:0 0 22px;max-width:900px;\">Measured in tonnes, not gestures<\u002Fh2>\n        <p style=\"font-size:clamp(16px,2vw,20px);line-height:1.55;color:#55594f;max-width:620px;margin:0 0 56px;\">Impact is an output of throughput. Every facility reports the same compliance-grade metrics, so results compound predictably as capacity scales.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:#E4E4E0;border:1px solid #E4E4E0;margin-bottom:80px;\">\n          <div style=\"background:#FAFAF8;padding:40px 32px;\"><div style=\"font-family:'Bebas Neue';font-size:34px;letter-spacing:1px;color:#1A7A1A;\">Tonnes diverted<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:#55594f;margin:12px 0 0;\">Mass of footwear kept out of landfill and incineration.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FAFAF8;padding:40px 32px;\"><div style=\"font-family:'Bebas Neue';font-size:34px;letter-spacing:1px;color:#1A7A1A;\">Recovery rate<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:#55594f;margin:12px 0 0;\">Share of intake mass converted into sellable material streams.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FAFAF8;padding:40px 32px;\"><div style=\"font-family:'Bebas Neue';font-size:34px;letter-spacing:1px;color:#1A7A1A;\">CO₂e avoided<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:#55594f;margin:12px 0 0;\">Emissions displaced versus virgin material and disposal.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FAFAF8;padding:40px 32px;\"><div style=\"font-family:'Bebas Neue';font-size:34px;letter-spacing:1px;color:#1A7A1A;\">Chain of custody<\u002Fdiv><p style=\"font-size:14px;line-height:1.6;color:#55594f;margin:12px 0 0;\">Tracked intake-to-offtake records for EPR reporting.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-end;gap:20px;margin-bottom:40px;\">\n          <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(28px,4vw,52px);letter-spacing:1px;margin:0;max-width:560px;\">Capacity scales in standardized increments<\u002Fh3>\n          <span style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9aa09a;\">Indicative ramp — design target<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-items:end;height:240px;\">\n          <div style=\"display:flex;flex-direction:column;justify-content:flex-end;height:100%;\"><div style=\"background:#C4E2C4;height:22%;\"><\u002Fdiv><div style=\"font-size:12px;color:#8a908a;margin-top:12px;letter-spacing:1px;\">PHASE 1<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;justify-content:flex-end;height:100%;\"><div style=\"background:#7AC57A;height:45%;\"><\u002Fdiv><div style=\"font-size:12px;color:#8a908a;margin-top:12px;letter-spacing:1px;\">PHASE 2<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;justify-content:flex-end;height:100%;\"><div style=\"background:#2E9A2E;height:72%;\"><\u002Fdiv><div style=\"font-size:12px;color:#8a908a;margin-top:12px;letter-spacing:1px;\">PHASE 3<\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;justify-content:flex-end;height:100%;\"><div style=\"background:#1A7A1A;height:100%;\"><\u002Fdiv><div style=\"font-size:12px;color:#8a908a;margin-top:12px;letter-spacing:1px;\">PHASE 4<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;line-height:1.6;color:#55594f;max-width:640px;margin:34px 0 0;\">Each facility is a repeatable unit with a known cost, footprint, and output profile. Adding capacity means replicating the unit — recovery volume, material supply, and avoided emissions grow with it.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== ABOUT ===== -->\n    <section id=\"about\" style=\"background:#0A0A0A;color:#fff;padding:clamp(80px,10vw,132px) 0;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;\">\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#3DBF44;margin-bottom:18px;\">About<\u002Fdiv>\n        <h2 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(38px,6vw,92px);line-height:0.9;letter-spacing:1px;margin:0 0 22px;max-width:960px;\">Building the missing layer of the footwear supply chain<\u002Fh2>\n        <p style=\"font-size:clamp(16px,2vw,20px);line-height:1.55;color:#c2c7c2;max-width:640px;margin:0 0 60px;\">Footwear is one of the most disposed-of consumer products on earth and one of the least recoverable. We exist to make it recoverable at industrial scale.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:56px;margin-bottom:72px;\">\n          <div>\n            <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(26px,3.5vw,40px);letter-spacing:1px;margin:0 0 16px;\">The thesis<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#b9beb9;margin:0 0 16px;\">Every recovery chain — paper, metal, glass, PET — was built by infrastructure, not by goodwill. Footwear has no equivalent. The shoe is a bonded composite of rubber, foam, textile, and plastics, which makes it nearly impossible to recycle through existing single-stream systems.<\u002Fp>\n            <p style=\"font-size:16px;line-height:1.65;color:#b9beb9;margin:0;\">Kicks CTRL builds the dedicated layer that separates those materials and routes each into a clean, sellable stream — turning a waste liability into a supply of secondary raw material.<\u002Fp>\n          <\u002Fdiv>\n          <div>\n            <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(26px,3.5vw,40px);letter-spacing:1px;margin:0 0 16px;\">How we operate<\u002Fh3>\n            <p style=\"font-size:16px;line-height:1.65;color:#b9beb9;margin:0 0 16px;\">We run a vertically integrated chain: aggregated collection, regional sorting facilities, and material processing with offtake agreements to industrial buyers. Volume is aggregated from brands meeting EPR obligations, retailer take-back, and municipal waste streams.<\u002Fp>\n            <p style=\"font-size:16px;line-height:1.65;color:#b9beb9;margin:0;\">Operations are anchored in Africa, where formal recycling infrastructure is below 1% and where global footwear waste increasingly flows — positioning recovery capacity at the point of greatest accumulation.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#3DBF44;margin-bottom:30px;\">Operating principles<\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:1px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.08);\">\n          <div style=\"background:#0A0A0A;padding:34px;\"><h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:24px;letter-spacing:1px;margin:0 0 10px;\">Infrastructure first<\u002Fh4><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">We build physical capacity, not campaigns. Throughput is the product.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0A0A0A;padding:34px;\"><h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:24px;letter-spacing:1px;margin:0 0 10px;\">Material purity<\u002Fh4><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Output is graded to spec so it competes with virgin feedstock, not just diverts it.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0A0A0A;padding:34px;\"><h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:24px;letter-spacing:1px;margin:0 0 10px;\">Auditable chain<\u002Fh4><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Every tonne is tracked from intake to offtake for compliance-grade reporting.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#0A0A0A;padding:34px;\"><h4 style=\"font-family:'Bebas Neue';font-weight:400;font-size:24px;letter-spacing:1px;margin:0 0 10px;\">Modular scale<\u002Fh4><p style=\"font-size:14px;line-height:1.6;color:#b9beb9;margin:0;\">Facilities replicate as standardized units, so capacity grows in predictable increments.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== PARTNERS ===== -->\n    <section id=\"partners\" style=\"background:#FAFAF8;padding:clamp(80px,10vw,132px) 0;\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:0 28px;\">\n        <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#1A7A1A;margin-bottom:18px;\">Partners<\u002Fdiv>\n        <h2 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(38px,6vw,92px);line-height:0.9;letter-spacing:1px;margin:0 0 22px;max-width:900px;\">Infrastructure runs on partnerships<\u002Fh2>\n        <p style=\"font-size:clamp(16px,2vw,20px);line-height:1.55;color:#55594f;max-width:620px;margin:0 0 56px;\">A recovery chain only works when supply, processing, and demand are connected. We sit at that intersection and convene it.<\u002Fp>\n\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1px;background:#E4E4E0;border:1px solid #E4E4E0;margin-bottom:64px;\">\n          <div style=\"background:#FAFAF8;padding:40px 34px;\"><div style=\"font-family:'Bebas Neue';font-size:46px;color:#1A7A1A;line-height:1;\">A<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:28px;letter-spacing:1px;margin:16px 0 10px;\">Brands &amp; retailers<\u002Fh3><p style=\"font-size:15px;line-height:1.6;color:#55594f;margin:0;\">Audited take-back and recovery routes to meet EPR obligations and remove destruction from the supply chain.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FAFAF8;padding:40px 34px;\"><div style=\"font-family:'Bebas Neue';font-size:46px;color:#1A7A1A;line-height:1;\">B<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:28px;letter-spacing:1px;margin:16px 0 10px;\">Municipalities<\u002Fh3><p style=\"font-size:15px;line-height:1.6;color:#55594f;margin:0;\">Diversion of footwear from waste streams into a tracked, reportable recovery channel.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FAFAF8;padding:40px 34px;\"><div style=\"font-family:'Bebas Neue';font-size:46px;color:#1A7A1A;line-height:1;\">C<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:28px;letter-spacing:1px;margin:16px 0 10px;\">Material buyers<\u002Fh3><p style=\"font-size:15px;line-height:1.6;color:#55594f;margin:0;\">Recurring supply of graded rubber, foam, and textile feedstock under offtake agreements.<\u002Fp><\u002Fdiv>\n          <div style=\"background:#FAFAF8;padding:40px 34px;\"><div style=\"font-family:'Bebas Neue';font-size:46px;color:#1A7A1A;line-height:1;\">D<\u002Fdiv><h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:28px;letter-spacing:1px;margin:16px 0 10px;\">Capital partners<\u002Fh3><p style=\"font-size:15px;line-height:1.6;color:#55594f;margin:0;\">Investors funding the build-out of repeatable, asset-backed recovery facilities.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:30px;background:#0A0A0A;color:#fff;padding:clamp(40px,6vw,64px);\">\n          <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(28px,4vw,56px);line-height:0.95;letter-spacing:1px;margin:0;max-width:660px;\">Bring volume, capital, or demand. We connect the chain.<\u002Fh3>\n          <a href=\"#contact\" style=\"display:inline-block;background:#1A7A1A;color:#fff;padding:17px 30px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0;cursor:pointer;\" style-hover=\"background:#22982A;\">Partner inquiry &nbsp;→<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== CONTACT / INVEST ===== -->\n    <section id=\"contact\" style=\"background:#0A0A0A;color:#fff;border-top:1px solid rgba(255,255,255,0.08);\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:clamp(80px,10vw,132px) 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:64px;align-items:start;\">\n        <div>\n          <div style=\"font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:#3DBF44;margin-bottom:18px;\">Investor / Partner Inquiry<\u002Fdiv>\n          <h2 style=\"font-family:'Bebas Neue';font-weight:400;font-size:clamp(40px,6vw,92px);line-height:0.9;letter-spacing:1px;margin:0 0 24px;\">Let's build the recovery layer<\u002Fh2>\n          <p style=\"font-size:17px;line-height:1.6;color:#b9beb9;max-width:440px;margin:0 0 40px;\">Tell us where you fit — capital, supply, or material demand. We respond to qualified inquiries within five business days.<\u002Fp>\n          <div style=\"border-top:1px solid rgba(255,255,255,0.1);padding-top:28px;display:flex;flex-direction:column;gap:18px;\">\n            <div><div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b716b;margin-bottom:6px;\">General<\u002Fdiv><div style=\"font-size:16px;\">hello@kicksctrl.com<\u002Fdiv><\u002Fdiv>\n            <div><div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b716b;margin-bottom:6px;\">Investment<\u002Fdiv><div style=\"font-size:16px;\">invest@kicksctrl.com<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"background:#111210;border:1px solid rgba(255,255,255,0.1);padding:clamp(28px,4vw,44px);\">\n          <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"text-align:center;padding:40px 8px;\">\n              <div style=\"width:48px;height:48px;background:#1A7A1A;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;font-size:24px;\">✓<\u002Fdiv>\n              <h3 style=\"font-family:'Bebas Neue';font-weight:400;font-size:40px;letter-spacing:1px;margin:0 0 12px;\">Inquiry received<\u002Fh3>\n              <p style=\"font-size:15px;color:#b9beb9;line-height:1.6;margin:0 0 28px;\">Thank you — we'll be in touch within five business days.<\u002Fp>\n              <button onclick=\"{{ resetForm }}\" style=\"background:none;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:12px 22px;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;\">Submit another<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ notSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n            <form onsubmit=\"{{ onSubmit }}\">\n              <div style=\"display:flex;flex-direction:column;gap:20px;\">\n                <div>\n                  <label style=\"display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;margin-bottom:9px;\">Name<\u002Flabel>\n                  <input value=\"{{ fName }}\" onchange=\"{{ onName }}\" placeholder=\"Full name\" style=\"width:100%;background:#0A0A0A;border:1px solid rgba(255,255,255,0.14);color:#fff;padding:13px 14px;font-size:15px;outline:none;\" style-focus=\"border-color:#1A7A1A;\">\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;margin-bottom:9px;\">Email<\u002Flabel>\n                  <input value=\"{{ fEmail }}\" onchange=\"{{ onEmail }}\" type=\"email\" placeholder=\"you@company.com\" style=\"width:100%;background:#0A0A0A;border:1px solid rgba(255,255,255,0.14);color:#fff;padding:13px 14px;font-size:15px;outline:none;\" style-focus=\"border-color:#1A7A1A;\">\n                <\u002Fdiv>\n                <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:20px;\">\n                  <div>\n                    <label style=\"display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;margin-bottom:9px;\">Role<\u002Flabel>\n                    <select value=\"{{ fRole }}\" onchange=\"{{ onRole }}\" style=\"width:100%;background:#0A0A0A;border:1px solid rgba(255,255,255,0.14);color:#fff;padding:13px 14px;font-size:15px;outline:none;\" style-focus=\"border-color:#1A7A1A;\">\n                      <option value=\"\">Select role<\u002Foption>\n                      <option value=\"Investor\">Investor<\u002Foption>\n                      <option value=\"Brand / Retailer\">Brand / Retailer<\u002Foption>\n                      <option value=\"Municipality\">Municipality<\u002Foption>\n                      <option value=\"Material buyer\">Material buyer<\u002Foption>\n                      <option value=\"Other\">Other<\u002Foption>\n                    <\u002Fselect>\n                  <\u002Fdiv>\n                  <div>\n                    <label style=\"display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;margin-bottom:9px;\">Company<\u002Flabel>\n                    <input value=\"{{ fCompany }}\" onchange=\"{{ onCompany }}\" placeholder=\"Organization\" style=\"width:100%;background:#0A0A0A;border:1px solid rgba(255,255,255,0.14);color:#fff;padding:13px 14px;font-size:15px;outline:none;\" style-focus=\"border-color:#1A7A1A;\">\n                  <\u002Fdiv>\n                <\u002Fdiv>\n                <div>\n                  <label style=\"display:block;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#8a908a;margin-bottom:9px;\">Message<\u002Flabel>\n                  <textarea value=\"{{ fMessage }}\" onchange=\"{{ onMessage }}\" rows=\"4\" placeholder=\"How would you like to engage?\" style=\"width:100%;background:#0A0A0A;border:1px solid rgba(255,255,255,0.14);color:#fff;padding:13px 14px;font-size:15px;outline:none;resize:vertical;font-family:inherit;\"><\u002Ftextarea>\n                <\u002Fdiv>\n                <button type=\"submit\" style=\"background:#1A7A1A;color:#fff;border:none;padding:16px;font-size:13px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;width:100%;\" style-hover=\"background:#22982A;\">Submit inquiry<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fform>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n\n  <footer style=\"background:#0A0A0A;color:#fff;border-top:1px solid rgba(255,255,255,0.08);\">\n    <div style=\"max-width:1240px;margin:0 auto;padding:clamp(48px,6vw,72px) 28px;display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:40px;\">\n      <div style=\"grid-column:1 / -1;display:flex;align-items:center;gap:11px;margin-bottom:8px;\">\n        <span style=\"width:12px;height:12px;background:#1A7A1A;display:block;\"><\u002Fspan>\n        <span style=\"font-family:'Bebas Neue';font-size:25px;letter-spacing:2px;\">KICKSCTRL<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"max-width:300px;\">\n        <p style=\"font-size:14px;line-height:1.6;color:#8a908a;margin:0;\">End-of-life footwear recovery infrastructure. We collect, sort, and recycle post-consumer footwear into clean material streams.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b716b;margin-bottom:16px;\">Navigate<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;\">\n          <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"6\">\n            <a href=\"{{ item.href }}\" onclick=\"{{ item.onClick }}\" style=\"text-align:left;padding:0;font-size:14px;color:#b9beb9;cursor:pointer;\" style-hover=\"color:#fff;\">{{ item.label }}<\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#6b716b;margin-bottom:16px;\">Contact<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:11px;font-size:14px;color:#b9beb9;\">\n          <span>hello@kicksctrl.com<\u002Fspan>\n          <span>invest@kicksctrl.com<\u002Fspan>\n          <a href=\"#contact\" style=\"text-align:left;padding:0;font-size:14px;color:#3DBF44;cursor:pointer;\" style-hover=\"color:#fff;\">Investor / Partner Inquiry →<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,0.08);\">\n      <div style=\"max-width:1240px;margin:0 auto;padding:22px 28px;display:flex;flex-wrap:wrap;justify-content:space-between;gap:12px;font-size:12px;color:#6b716b;letter-spacing:0.5px;\">\n        <span>© 2026 Kicks CTRL. All rights reserved.<\u002Fspan>\n        <span>Recovery infrastructure · Built for EPR 2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:820},&quot;reduceMotion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;particleDensity&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.3,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    winW: (typeof window !== 'undefined' ? window.innerWidth : 1200),\n    menuOpen: false,\n    active: 'top',\n    submitted: false,\n    form: { name: '', email: '', role: '', company: '', message: '' }\n  };\n\n  constructor(props) {\n    super(props);\n    this.canvasRef = React.createRef();\n  }\n\n  componentDidMount() {\n    this._onWinResize = () => {\n      this.setState({ winW: window.innerWidth });\n      if (this.onResize) this.onResize();\n    };\n    window.addEventListener('resize', this._onWinResize);\n    this._onScroll = () => {\n      if (this._st) return;\n      this._st = requestAnimationFrame(() => { this._st = null; this.updateActive(); });\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n    this.startAnim();\n  }\n  componentWillUnmount() {\n    if (this.raf) cancelAnimationFrame(this.raf);\n    window.removeEventListener('resize', this._onWinResize);\n    window.removeEventListener('scroll', this._onScroll);\n  }\n\n  updateActive() {\n    const ids = ['contact', 'partners', 'about', 'impact', 'solution', 'problem', 'top'];\n    const y = window.pageYOffset + 100;\n    let act = 'top';\n    for (const id of ids) {\n      const el = document.getElementById(id);\n      if (el) {\n        const top = el.getBoundingClientRect().top + window.pageYOffset;\n        if (top <= y) { act = id; break; }\n      }\n    }\n    if (act !== this.state.active) this.setState({ active: act });\n  }\n\n  scrollTo(id) {\n    this.setState({ menuOpen: false });\n    if (id === 'top') { window.scrollTo({ top: 0, behavior: 'smooth' }); return; }\n    const el = document.getElementById(id);\n    if (el) {\n      const y = el.getBoundingClientRect().top + window.pageYOffset - 56;\n      window.scrollTo({ top: y, behavior: 'smooth' });\n    }\n  }\n\n  startAnim() {\n    const ref = this.canvasRef;\n    let W = 0, H = 0, dpr = 1;\n    let nodes = { sources: [], hub: [0, 0], outputs: [] };\n    const particles = [];\n    let pulse = 0;\n    const rand = (a, b) => a + Math.random() * (b - a);\n    const ease = t => (t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2);\n    const bez = (a, b, c, t) => {\n      const u = 1 - t;\n      return [u * u * a[0] + 2 * u * t * c[0] + t * t * b[0], u * u * a[1] + 2 * u * t * c[1] + t * t * b[1]];\n    };\n    const computeNodes = () => {\n      nodes.sources = [[0.08, 0.30], [0.21, 0.13], [0.40, 0.10], [0.11, 0.66], [0.27, 0.86]].map(p => [p[0] * W, p[1] * H]);\n      nodes.hub = [0.5 * W, 0.5 * H];\n      nodes.outputs = [\n        { p: [0.90 * W, 0.27 * H], label: 'RUBBER' },\n        { p: [0.945 * W, 0.50 * H], label: 'FOAM' },\n        { p: [0.90 * W, 0.73 * H], label: 'TEXTILE' }\n      ];\n    };\n    const spawn = () => {\n      const s = nodes.sources[(Math.random() * nodes.sources.length) | 0];\n      const hub = nodes.hub;\n      const cx = (s[0] + hub[0]) / 2 + rand(-0.06, 0.06) * W;\n      const cy = (s[1] + hub[1]) / 2 + rand(-0.08, 0.02) * H;\n      particles.push({ stage: 0, t: 0, sp: rand(0.006, 0.011), from: [s[0], s[1]], to: [hub[0], hub[1]], c: [cx, cy], size: rand(1.4, 2.6) });\n    };\n    const resize = () => {\n      const cv = ref.current;\n      if (!cv) return;\n      const r = cv.getBoundingClientRect();\n      if (r.width === 0) return;\n      dpr = Math.min(window.devicePixelRatio || 1, 2);\n      W = r.width; H = r.height;\n      cv.width = Math.round(W * dpr); cv.height = Math.round(H * dpr);\n      const ctx = cv.getContext('2d');\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n      computeNodes();\n    };\n    this.onResize = resize;\n    const frame = () => {\n      this.raf = requestAnimationFrame(frame);\n      const cv = ref.current;\n      if (!cv) return;\n      if (W === 0 || cv.width !== Math.round(W * dpr)) { resize(); if (W === 0) return; }\n      const reduce = !!this.props.reduceMotion;\n      const density = this.props.particleDensity != null ? this.props.particleDensity : 1;\n      const ctx = cv.getContext('2d');\n      ctx.clearRect(0, 0, W, H);\n\n      ctx.lineWidth = 1;\n      for (const s of nodes.sources) {\n        ctx.strokeStyle = 'rgba(255,255,255,0.05)';\n        ctx.beginPath(); ctx.moveTo(s[0], s[1]); ctx.lineTo(nodes.hub[0], nodes.hub[1]); ctx.stroke();\n      }\n      for (const o of nodes.outputs) {\n        ctx.strokeStyle = 'rgba(26,122,26,0.20)';\n        ctx.beginPath(); ctx.moveTo(nodes.hub[0], nodes.hub[1]); ctx.lineTo(o.p[0], o.p[1]); ctx.stroke();\n      }\n\n      const base = W < 700 ? 32 : 68;\n      const cap = Math.max(0, Math.round(base * density * (reduce ? 0.35 : 1)));\n      const spawnChance = reduce ? 0.28 : 0.6;\n      if (particles.length < cap && Math.random() < spawnChance) spawn();\n\n      for (let i = particles.length - 1; i >= 0; i--) {\n        const p = particles[i];\n        p.t += p.sp * (reduce ? 0.7 : 1);\n        const et = ease(Math.min(p.t, 1));\n        const pos = bez(p.from, p.to, p.c, et);\n        if (p.stage === 0) {\n          ctx.fillStyle = 'rgba(232,237,232,' + (0.22 + 0.5 * Math.sin(et * Math.PI)) + ')';\n          ctx.beginPath(); ctx.arc(pos[0], pos[1], p.size, 0, 7); ctx.fill();\n          if (p.t >= 1) {\n            pulse = 1;\n            const o = nodes.outputs[(Math.random() * nodes.outputs.length) | 0];\n            p.stage = 1; p.t = 0; p.sp = rand(0.007, 0.013);\n            p.from = [nodes.hub[0], nodes.hub[1]]; p.to = [o.p[0], o.p[1]];\n            p.c = [(p.from[0] + p.to[0]) / 2, (p.from[1] + p.to[1]) / 2 + rand(-0.05, 0.05) * H];\n          }\n        } else {\n          ctx.fillStyle = 'rgba(40,170,48,' + (0.9 * (1 - et * 0.35)) + ')';\n          ctx.shadowColor = 'rgba(26,122,26,0.8)'; ctx.shadowBlur = 6;\n          ctx.beginPath(); ctx.arc(pos[0], pos[1], p.size * 0.9, 0, 7); ctx.fill();\n          ctx.shadowBlur = 0;\n          if (p.t >= 1) particles.splice(i, 1);\n        }\n      }\n\n      pulse *= 0.94;\n      ctx.strokeStyle = 'rgba(26,122,26,' + (0.45 + 0.5 * pulse) + ')';\n      ctx.lineWidth = 1.5;\n      ctx.beginPath(); ctx.arc(nodes.hub[0], nodes.hub[1], 10 + pulse * 10, 0, 7); ctx.stroke();\n      ctx.fillStyle = '#1A7A1A';\n      ctx.beginPath(); ctx.arc(nodes.hub[0], nodes.hub[1], 4, 0, 7); ctx.fill();\n\n      ctx.font = '600 11px \"DM Sans\", sans-serif';\n      try { ctx.letterSpacing = '2px'; } catch (e) {}\n      ctx.fillStyle = 'rgba(255,255,255,0.55)';\n      ctx.textAlign = 'center';\n      ctx.fillText('AFRICA', nodes.hub[0], nodes.hub[1] + 30);\n      ctx.textAlign = 'right';\n      ctx.fillStyle = 'rgba(61,191,68,0.95)';\n      for (const o of nodes.outputs) {\n        ctx.fillText(o.label, o.p[0] - 10, o.p[1] + 4);\n        ctx.beginPath(); ctx.fillStyle = '#1A7A1A'; ctx.arc(o.p[0], o.p[1], 3.2, 0, 7); ctx.fill();\n        ctx.fillStyle = 'rgba(61,191,68,0.95)';\n      }\n      try { ctx.letterSpacing = '0px'; } catch (e) {}\n      ctx.fillStyle = 'rgba(255,255,255,0.32)';\n      for (const s of nodes.sources) {\n        ctx.beginPath(); ctx.arc(s[0], s[1], 3, 0, 7); ctx.fill();\n      }\n    };\n    resize();\n    this.raf = requestAnimationFrame(frame);\n  }\n\n  setField(k, v) {\n    this.setState(s => ({ form: Object.assign({}, s.form, { [k]: v }) }));\n  }\n\n  renderVals() {\n    const sections = [\n      ['problem', 'Problem'], ['solution', 'Solution'], ['impact', 'Impact'],\n      ['about', 'About'], ['partners', 'Partners'], ['contact', 'Contact']\n    ];\n    const cur = this.state.active;\n    const navItems = sections.map(([id, label]) => ({\n      label,\n      href: '#' + id,\n      onClick: () => this.setState({ menuOpen: false }),\n      color: cur === id ? '#ffffff' : '#9ca39c',\n      bd: cur === id ? '2px solid #1A7A1A' : '2px solid transparent'\n    }));\n    const mobile = this.state.winW < 900;\n    const f = this.state.form;\n    return {\n      navItems,\n      showDesktopNav: !mobile,\n      showBurger: mobile,\n      burgerIcon: this.state.menuOpen ? '✕' : '☰',\n      mobileMenuOpen: mobile && this.state.menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      closeMenu: () => this.setState({ menuOpen: false }),\n      canvasRef: this.canvasRef,\n      submitted: this.state.submitted,\n      notSubmitted: !this.state.submitted,\n      fName: f.name, fEmail: f.email, fRole: f.role, fCompany: f.company, fMessage: f.message,\n      onName: e => this.setField('name', e.target.value),\n      onEmail: e => this.setField('email', e.target.value),\n      onRole: e => this.setField('role', e.target.value),\n      onCompany: e => this.setField('company', e.target.value),\n      onMessage: e => this.setField('message', e.target.value),\n      onSubmit: e => { e.preventDefault(); this.setState({ submitted: true }); },\n      resetForm: () => this.setState({ submitted: false, form: { name: '', email: '', role: '', company: '', message: '' } })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
